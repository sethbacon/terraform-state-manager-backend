openapi: "3.0.3"
info:
  title: Terraform State Manager API
  version: "1.0.0"
  description: REST API for the Terraform State Manager backend.

servers:
  - url: /api/v1
    description: Current deployment

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    Success:
      type: object
      properties:
        data:
          type: object
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    TokenResponse:
      type: object
      properties:
        token:
          type: string

    Source:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        config:
          type: object
        created_at:
          type: string
          format: date-time

    SourceRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        config:
          type: object

    AnalysisRun:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        source_id:
          type: string
        created_at:
          type: string
          format: date-time

    AnalysisRunRequest:
      type: object
      required: [source_id]
      properties:
        source_id:
          type: string

    Report:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    ReportGenerateRequest:
      type: object
      required: [analysis_run_id]
      properties:
        analysis_run_id:
          type: string
        format:
          type: string
          enum: [pdf, html, json, csv]

    SchedulerTask:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        schedule:
          type: string
        enabled:
          type: boolean

    SchedulerTaskRequest:
      type: object
      required: [name, schedule]
      properties:
        name:
          type: string
        schedule:
          type: string
        enabled:
          type: boolean

    Snapshot:
      type: object
      properties:
        id:
          type: string
        source_id:
          type: string
        created_at:
          type: string
          format: date-time

    Backup:
      type: object
      properties:
        id:
          type: string
        source_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    BackupRequest:
      type: object
      required: [source_id]
      properties:
        source_id:
          type: string

    BulkBackupRequest:
      type: object
      required: [source_ids]
      properties:
        source_ids:
          type: array
          items:
            type: string

    RetentionPolicy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        retention_days:
          type: integer

    RetentionPolicyRequest:
      type: object
      required: [name, retention_days]
      properties:
        name:
          type: string
        retention_days:
          type: integer

    Migration:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    MigrationRequest:
      type: object
      properties:
        source_id:
          type: string
        destination:
          type: object

    Alert:
      type: object
      properties:
        id:
          type: string
        rule_id:
          type: string
        severity:
          type: string
        acknowledged:
          type: boolean
        created_at:
          type: string
          format: date-time

    AlertRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        condition:
          type: object
        enabled:
          type: boolean

    AlertRuleRequest:
      type: object
      required: [name, condition]
      properties:
        name:
          type: string
        condition:
          type: object
        enabled:
          type: boolean

    NotificationChannel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        config:
          type: object

    NotificationChannelRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        config:
          type: object

    CompliancePolicy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        rules:
          type: array
          items:
            type: object

    CompliancePolicyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        rules:
          type: array
          items:
            type: object

    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    OrganizationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    APIKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
        created_at:
          type: string
          format: date-time

    APIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    RoleTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string

    RoleTemplateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:

  # ---------------------------------------------------------------------------
  # Setup wizard (unauthenticated or setup-token authenticated)
  # ---------------------------------------------------------------------------

  /setup/status:
    get:
      summary: Get setup status
      operationId: getSetupStatus
      security: []
      tags: [Setup]
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /setup/validate-token:
    post:
      summary: Validate the one-time setup token
      operationId: validateSetupToken
      security: []
      tags: [Setup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /setup/oidc/test:
    post:
      summary: Test OIDC configuration
      operationId: testOIDCConfig
      security: []
      tags: [Setup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issuer_url:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
                  format: password
      responses:
        "200":
          description: OIDC config valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "400":
          description: Invalid OIDC config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /setup/oidc:
    post:
      summary: Save OIDC configuration
      operationId: saveOIDCConfig
      security: []
      tags: [Setup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issuer_url:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
                  format: password
                redirect_url:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: OIDC config saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /setup/admin:
    post:
      summary: Configure initial admin account
      operationId: configureAdmin
      security: []
      tags: [Setup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, email]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Admin configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /setup/complete:
    post:
      summary: Complete the setup wizard
      operationId: completeSetup
      security: []
      tags: [Setup]
      responses:
        "200":
          description: Setup complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ---------------------------------------------------------------------------
  # Authentication (public)
  # ---------------------------------------------------------------------------

  /auth/login:
    get:
      summary: Initiate OIDC login (redirect)
      operationId: authLogin
      security: []
      tags: [Auth]
      responses:
        "302":
          description: Redirect to OIDC provider

  /auth/callback:
    get:
      summary: OIDC callback handler
      operationId: authCallback
      security: []
      tags: [Auth]
      parameters:
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    get:
      summary: Log out the current session
      operationId: authLogout
      security: []
      tags: [Auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ---------------------------------------------------------------------------
  # Authentication (requires auth)
  # ---------------------------------------------------------------------------

  /auth/refresh:
    post:
      summary: Refresh the authentication token
      operationId: authRefresh
      tags: [Auth]
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      summary: Get the currently authenticated user
      operationId: authMe
      tags: [Auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ---------------------------------------------------------------------------
  # Admin — Dashboard Stats
  # ---------------------------------------------------------------------------

  /admin/stats/dashboard:
    get:
      summary: Get dashboard statistics
      operationId: getDashboardStats
      tags: [Admin]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ---------------------------------------------------------------------------
  # API Keys
  # ---------------------------------------------------------------------------

  /apikeys:
    get:
      summary: List API keys
      operationId: listAPIKeys
      tags: [API Keys]
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKey'
    post:
      summary: Create an API key
      operationId: createAPIKey
      tags: [API Keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIKeyRequest'
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'

  /apikeys/{id}:
    get:
      summary: Get an API key
      operationId: getAPIKey
      tags: [API Keys]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update an API key
      operationId: updateAPIKey
      tags: [API Keys]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIKeyRequest'
      responses:
        "200":
          description: API key updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
    delete:
      summary: Delete an API key
      operationId: deleteAPIKey
      tags: [API Keys]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /apikeys/{id}/rotate:
    post:
      summary: Rotate an API key
      operationId: rotateAPIKey
      tags: [API Keys]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rotated API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'

  # ---------------------------------------------------------------------------
  # Users
  # ---------------------------------------------------------------------------

  /users/me/memberships:
    get:
      summary: Get current user's organization memberships
      operationId: getCurrentUserMemberships
      tags: [Users]
      responses:
        "200":
          description: Memberships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /users:
    get:
      summary: List users
      operationId: listUsers
      tags: [Users]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Create a user
      operationId: createUser
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/search:
    get:
      summary: Search users
      operationId: searchUsers
      tags: [Users]
      parameters:
        - in: query
          name: q
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      summary: Get a user
      operationId: getUser
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update a user
      operationId: updateUser
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      summary: Delete a user
      operationId: deleteUser
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /users/{id}/memberships:
    get:
      summary: Get a user's memberships
      operationId: getUserMemberships
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Memberships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  # ---------------------------------------------------------------------------
  # Organizations
  # ---------------------------------------------------------------------------

  /organizations:
    get:
      summary: List organizations
      operationId: listOrganizations
      tags: [Organizations]
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
    post:
      summary: Create an organization
      operationId: createOrganization
      tags: [Organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'

  /organizations/search:
    get:
      summary: Search organizations
      operationId: searchOrganizations
      tags: [Organizations]
      parameters:
        - in: query
          name: q
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'

  /organizations/{id}:
    get:
      summary: Get an organization
      operationId: getOrganization
      tags: [Organizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    put:
      summary: Update an organization
      operationId: updateOrganization
      tags: [Organizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    delete:
      summary: Delete an organization
      operationId: deleteOrganization
      tags: [Organizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /organizations/{id}/members:
    get:
      summary: List organization members
      operationId: listOrgMembers
      tags: [Organizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
    post:
      summary: Add a member to an organization
      operationId: addOrgMember
      tags: [Organizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                role:
                  type: string
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /organizations/{id}/members/{user_id}:
    put:
      summary: Update a member's role in an organization
      operationId: updateOrgMember
      tags: [Organizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
    delete:
      summary: Remove a member from an organization
      operationId: removeOrgMember
      tags: [Organizations]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Member removed

  # ---------------------------------------------------------------------------
  # Admin — Role Templates
  # ---------------------------------------------------------------------------

  /admin/role-templates:
    get:
      summary: List role templates
      operationId: listRoleTemplates
      tags: [Admin]
      responses:
        "200":
          description: List of role templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleTemplate'
    post:
      summary: Create a role template
      operationId: createRoleTemplate
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleTemplateRequest'
      responses:
        "201":
          description: Role template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleTemplate'

  /admin/role-templates/{id}:
    get:
      summary: Get a role template
      operationId: getRoleTemplate
      tags: [Admin]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Role template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleTemplate'
    put:
      summary: Update a role template
      operationId: updateRoleTemplate
      tags: [Admin]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleTemplateRequest'
      responses:
        "200":
          description: Role template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleTemplate'
    delete:
      summary: Delete a role template
      operationId: deleteRoleTemplate
      tags: [Admin]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ---------------------------------------------------------------------------
  # Sources
  # ---------------------------------------------------------------------------

  /sources:
    get:
      summary: List state sources
      operationId: listSources
      tags: [Sources]
      responses:
        "200":
          description: List of sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Source'
    post:
      summary: Create a state source
      operationId: createSource
      tags: [Sources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceRequest'
      responses:
        "201":
          description: Source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'

