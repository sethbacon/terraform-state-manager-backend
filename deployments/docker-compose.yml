version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: terraform_state_manager
      POSTGRES_USER: tsm
      POSTGRES_PASSWORD: tsm_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsm -d terraform_state_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      TSM_DATABASE_URL: "postgres://tsm:tsm_dev_password@postgres:5432/terraform_state_manager?sslmode=disable"
      TSM_JWT_SECRET: "dev-secret-change-in-production"
      TSM_DEV_MODE: "true"
      TSM_STORAGE_TYPE: "local"
      TSM_STORAGE_LOCAL_PATH: "/data/backups"
      TSM_LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups:/data/backups

  frontend:
    build:
      context: ../../terraform-state-manager-frontend/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backups:
