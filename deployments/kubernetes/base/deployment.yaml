apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsm-backend
  labels:
    app: tsm
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tsm
      component: backend
  template:
    metadata:
      labels:
        app: tsm
        component: backend
    spec:
      containers:
        - name: backend
          image: terraform-state-manager-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: tsm-config
            - secretRef:
                name: tsm-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsm-frontend
  labels:
    app: tsm
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tsm
      component: frontend
  template:
    metadata:
      labels:
        app: tsm
        component: frontend
    spec:
      containers:
        - name: frontend
          image: terraform-state-manager-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
