apiVersion: v1
kind: Service
metadata:
  name: tsm-backend
  labels:
    app: tsm
    component: backend
spec:
  selector:
    app: tsm
    component: backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: tsm-frontend
  labels:
    app: tsm
    component: frontend
spec:
  selector:
    app: tsm
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
