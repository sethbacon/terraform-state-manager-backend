apiVersion: v1
kind: Secret
metadata:
  name: tsm-secrets
  labels:
    app: tsm
type: Opaque
stringData:
  TSM_DATABASE_URL: "postgres://tsm:CHANGE_ME@postgres:5432/terraform_state_manager?sslmode=require"
  TSM_JWT_SECRET: "CHANGE_ME"
  TSM_OIDC_ISSUER: "https://your-idp.example.com"
  TSM_OIDC_CLIENT_ID: "CHANGE_ME"
  TSM_OIDC_CLIENT_SECRET: "CHANGE_ME"
  TSM_OIDC_REDIRECT_URL: "https://tsm.example.com/callback"
