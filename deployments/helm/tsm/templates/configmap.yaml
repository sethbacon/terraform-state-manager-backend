apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    {{- include "tsm.labels" . | nindent 4 }}
data:
  TSM_DEV_MODE: {{ .Values.config.devMode | quote }}
  TSM_STORAGE_TYPE: {{ .Values.config.storageType | quote }}
  TSM_STORAGE_LOCAL_PATH: {{ .Values.config.storagePath | quote }}
  TSM_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
