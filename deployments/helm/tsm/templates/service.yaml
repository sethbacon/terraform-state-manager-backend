apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "tsm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.backend.type }}
  selector:
    {{- include "tsm.backendSelectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "tsm.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.frontend.type }}
  selector:
    {{- include "tsm.frontendSelectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: 80
      protocol: TCP
